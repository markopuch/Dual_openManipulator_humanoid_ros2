controller_names:
  - dual_arm_controller
  - left_gripper_controller
  - right_gripper_controller

dual_arm_controller:
  type: FollowJointTrajectory
  action_ns: follow_joint_trajectory
  default: true
  joints:
    - left_joint1
    - left_joint2
    - left_joint3
    - left_joint4
    - right_joint1
    - right_joint2
    - right_joint3
    - right_joint4

left_gripper_controller:
  type: GripperCommand
  action_ns: gripper_cmd
  default: true
  joints:
    - left_gripper_left_joint

right_gripper_controller:
  type: GripperCommand
  action_ns: gripper_cmd
  default: true
  joints:
    - right_gripper_left_joint
